<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2d7a3a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="icon" type="image/png" href="/krishivoice-icon.png" />
    <link rel="apple-touch-icon" href="/krishivoice-icon.png" />
    <title>KrishiVoice — कृषि आवाज़</title>
    <meta name="description" content="KrishiVoice - Empowering farmers with voice-powered crop listings in Hindi, Bhojpuri, Tamil, Marathi and Punjabi." />
    <!-- Google Fonts: Inter + Playfair Display + Noto Sans Devanagari -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(event) {
        var errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'color: white; background: red; padding: 20px; font-family: sans-serif; position: fixed; top: 0; left: 0; right: 0; z-index: 9999; word-wrap: break-word;';
        errorDiv.innerHTML = '<strong>App Error:</strong> ' + event.message + '<br><br>File: ' + event.filename + ':' + event.lineno;
        document.body.appendChild(errorDiv);
      });
      window.addEventListener('unhandledrejection', function(event) {
        var errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'color: white; background: darkred; padding: 20px; font-family: sans-serif; position: fixed; top: 0; left: 0; right: 0; z-index: 9999; word-wrap: break-word;';
        errorDiv.innerHTML = '<strong>Unhandled Promise:</strong> ' + (event.reason ? event.reason.message || event.reason : 'Unknown reason');
        document.body.appendChild(errorDiv);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
